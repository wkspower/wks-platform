# WKS Platform — DEV compose surface (zero-config quick-start).
#
# Operator path:
#   docker compose -f docker/docker-compose.yml up
#   (or: cd docker && docker compose up)
#
# H2 file-mode datasource at ./data/, local storage, console logging.
# Story 1.1 zero-config dev contract — boots without any operator-supplied
# secrets and without any env file. NO `profiles:` field on the service:
# the file-split in Story 14.1.1 fix-up removed the production stack from
# this file entirely, so port-8080 collision is structurally impossible.
#
# The PRODUCTION single-tenant stack (Postgres + MinIO + WKS app) lives at
# docker/docker-compose.prod.yml. The optional SSO seam (Keycloak) lives at
# docker/docker-compose.sso.yml. See docker/README.md for operator commands.
#
# Architecture reference: Decision 8 (§388–443) — single-image multi-stage
# build, env-only config. Decision 25 (§932–958) — ZERO tenant_id invariant.

services:
  wks-platform:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: wkspower/wks-platform:2.0.0-dev
    container_name: wks-platform
    ports:
      - "8080:8080"
    environment:
      TZ: UTC
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - wks-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

volumes:
  wks-data:
    driver: local
