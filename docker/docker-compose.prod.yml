# WKS Platform — PRODUCTION compose surface (single-tenant).
#
# Operator path:
#   cp docker/.env.production.example docker/.env  # then fill in values
#   docker compose -f docker/docker-compose.prod.yml up
#
# Story 14.1 — discharges Story 14.7 §8 / WKS-API-053 H2/Postgres bug.
# Story 14.1.1 fix-up — file-split replaces the previous `--profile production`
# selector with a dedicated production file. The dev wks-platform service no
# longer shares this file, so port-8080 collision is structurally impossible
# (the previous workaround `profiles: [dev]` + tracked docker/.env are both
# obsolete and removed).
#
# Architecture Decision 8 (§388–443) — single-image multi-stage build, env-only
# config. Decision 25 (§932–958) — ZERO tenant_id in any compose value or env.
# This file is the SINGLE-TENANT production reference. The PER-CLIENT shape
# lives at deploy/templates/docker-compose.client.yml.template (Story 14.7) —
# sibling, not derivation. Both surfaces share the env-var contract.
#
# Optional SSO seam (Keycloak): stack with docker/docker-compose.sso.yml via
#   docker compose -f docker/docker-compose.prod.yml -f docker/docker-compose.sso.yml up
# Auth-provider integration is gated on Story 10.4 (Epic 7) — until then the
# WKS app emits WKS-AUTH-001 at WARN and built-in cookie-JWT auth (Story 1.2)
# remains active.

services:
  wks-platform-prod:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: wkspower/wks-platform:2.0.0-prod
    container_name: wks-platform-prod
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${WKS_HOST_PORT:-8080}:8080"
    environment:
      TZ: UTC
      SPRING_PROFILES_ACTIVE: production
      WKS_DB_URL: ${WKS_DB_URL}
      WKS_DB_USER: ${WKS_DB_USER}
      WKS_DB_PASSWORD: ${WKS_DB_PASSWORD}
      WKS_STORAGE_ENDPOINT: ${WKS_STORAGE_ENDPOINT}
      WKS_STORAGE_KEY: ${WKS_STORAGE_KEY}
      WKS_ADMIN_EMAIL: ${WKS_ADMIN_EMAIL}
      WKS_ADMIN_PASSWORD: ${WKS_ADMIN_PASSWORD}
      WKS_LOCALE: ${WKS_LOCALE:-en-IN}
      WKS_CORS_ORIGINS: ${WKS_CORS_ORIGINS:-}
      WKS_JWT_SECRET: ${WKS_JWT_SECRET}
      WKS_OPENAPI_ENABLED: ${WKS_OPENAPI_ENABLED:-false}
      # Consumed by ProductionBootstrapValidator AC7 for boot-time secret-rotation;
      # app does not use these at runtime; minio container is the actual consumer.
      WKS_MINIO_ROOT_USER: ${WKS_MINIO_ROOT_USER}
      WKS_MINIO_ROOT_PASSWORD: ${WKS_MINIO_ROOT_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

  # Pinned: postgres:16-alpine — current Hetzner/AWS managed-Postgres LTS-class
  # baseline (PG16 LTS through 2028), matches deploy/templates/docker-compose.client.yml.template
  # (14.7 single-tenant template).
  postgres:
    image: postgres:16-alpine
    container_name: wks-postgres
    environment:
      POSTGRES_DB: wks
      POSTGRES_USER: ${WKS_DB_USER}
      POSTGRES_PASSWORD: ${WKS_DB_PASSWORD}
    volumes:
      - wks-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WKS_DB_USER} -d wks"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # Pinned: minio/minio:RELEASE.2025-09-07T16-13-09Z — current stable as of
  # 2026-05 pickup; do NOT use :latest (per "Verify Library Claims Against BOM" rigor).
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: wks-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${WKS_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${WKS_MINIO_ROOT_PASSWORD}
    volumes:
      - wks-miniodata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
  wks-pgdata:
    driver: local
  wks-miniodata:
    driver: local
