services:
    pp-budget-calculator:
        build:
            context: apps/python/PPPython-script
        ports:
            - 5001:5000
        environment:
            - PORT=5000
            - HOST=0.0.0.0
            - DEBUG=false
            - LOG_FOLDER=/app/logs
            # Database configuration (can be overridden)
            - DB_SERVER=${PP_DB_SERVER:-216.48.180.83}
            - DB_DATABASE=${PP_DB_DATABASE:-RIL.AOP}
            - DB_USERNAME=${PP_DB_USERNAME:-sa}
            - DB_PASSWORD=${PP_DB_PASSWORD:-#Qwer123}
        volumes:
            - pp-budget-logs:/app/logs
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        restart: unless-stopped

volumes:
    pp-budget-logs:
        driver: local
