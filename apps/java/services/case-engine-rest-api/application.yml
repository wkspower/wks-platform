server:
   port: 8081

logging:
   level:
      root: INFO
      com.wks: INFO
      com.wks.api.security: INFO
      com.wks.caseengine: INFO
      com.wks.caseengine.command: INFO
      com.wks.caseengine.pagination: INFO
      org.springframework.web.client.RestTemplate: INFO
      org.springframework.security: INFO
      org.apache.http: INFO
      httpclient.wire: INFO

spring.mvc.converters.preferred-json-mapper: gson

# --- Orthogonal concerns: maximal/secure defaults; each overridable by env (one
# env-driven compose service) or by a per-concern Spring profile fragment. The
# curated `minimal` group below bundles the zero-container fragment set. ---
spring.profiles.group.minimal: db-h2,bpm-none,auth-dev,authz-off,single-tenant,seed

wks.auth.mode: ${WKS_AUTH_MODE:keycloak}
wks.authz.opa.enabled: ${WKS_AUTHZ_OPA_ENABLED:true}
wks.bpm.engine: ${WKS_BPM_ENGINE:camunda7}
wks.tenancy.multi-tenant: ${WKS_TENANCY_MULTI_TENANT:true}
wks.seed.enabled: ${WKS_SEED_ENABLED:false}

# api-security defaults (issuer-uri, opa.url, tenant claim, dev-token roles/origins)
# live in the api-security library's api-security-defaults.properties — overridable
# here or via env. The auth-dev profile fragment overrides wks.auth.issuer-uri.

wks.bpm.engine.camunda.version: ${CAMUNDA_VERSION:camunda7}

camunda.bpm.client.base-url: ${CAMUNDA_BASE_URL:http://localhost:8080/engine-rest}

spring.data.mongodb.uri: ${MONGO_CONN:mongodb://localhost}
spring.data.mongodb.database: ${MONGO_DATABASE:shared}
spring.data.mongodb.database.min-pool-size: 0
spring.data.mongodb.database.max-pool-size: 5
spring.data.mongodb.database.max-connection-idle-time: 3000
spring.data.mongodb.database.max-connection-life-time: 3000

management.health.mongo.enabled: false
management.health.reds.enabled: false
management.endpoints.web.exposure.include: health,info
management.endpoint.health.show-details: never

case.engine.case-creation-process: case-instance-create
case.engine.email-to-case-process: email-to-case
case.engine.email-to-case-outbound-process: email-to-case-outbound

wks.api.actuator.enabled: true
wks.api.swagger.enabled: true

# database drive options: mongo or jpa (overridable by env; the db-h2/db-postgres
# profile fragments set jpa + the matching datasource — see application-db-*.yml)
database.type: ${DATABASE_TYPE:mongo}
