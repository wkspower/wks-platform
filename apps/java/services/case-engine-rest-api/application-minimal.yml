# Minimal, zero-external-container dev profile.
# Activate with: mvn spring-boot:run -Dspring-boot.run.profiles=minimal
#
# Bundles the minimal-mode value of every orthogonal concern so a developer can run
# case-engine-rest-api with NO external services (no MongoDB, Keycloak, OPA, Camunda,
# MinIO, Kafka). Each flag is independently toggleable; this profile just sets them
# all to their minimal value. The default (no profile) setup is unchanged and secure.

# --- Datastore: embedded H2 via the JPA path (no MongoDB container) ---
# (database.type is the key bound by @ConditionalOnProperty; wks.datastore.type is
# accepted too via SelectorAliasEnvironmentPostProcessor, but we set the canonical
# key here so the datastore selection never depends on alias timing.)
database.type: jpa

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoAutoConfiguration
      - org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration
  datasource:
    jdbcUrl: jdbc:h2:mem:wks;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  # The JPA EntityManagerFactory is built manually in EngineDatabaseTenantConfig
  # (it does not honor spring.jpa.hibernate.ddl-auto), so the schema is created
  # from schema-h2.sql via spring.sql.init rather than Hibernate DDL.
  sql:
    init:
      schema-locations: classpath:schema-h2.sql
      mode: always

# --- Authentication: embedded dev-token issuer (no Keycloak) ---
# The resource server validates dev tokens via the embedded JWKS, so the issuer
# URL must point at the in-process /dev-auth issuer served by this app.
wks.auth.mode: dev-token
wks.auth.issuer-uri: ${KEYCLOAK_URL:http://localhost:8081/dev-auth}

# --- Authorization: OPA off (no OPA container; authenticated requests permitted) ---
wks.authz.opa.enabled: false

# --- Workflow/BPM: local, no Camunda round-trip (cases persist directly) ---
wks.bpm.engine: none

# --- Tenancy: single tenant (no JWT org -> default schema/db) ---
wks.tenancy.multi-tenant: false
wks.tenancy.default-tenant: ${WKS_TENANCY_DEFAULT_TENANT:localhost}
wks.tenancy.claim-name: org

# --- Seed the demo case definitions/forms/queues into the empty datastore on boot ---
wks.seed.enabled: true
