# Concern fragment — Datastore: PostgreSQL via the JPA path.
# Schema via Hibernate ddl-auto (resolved/default tenant only; multi-tenant Postgres
# provisioning is a Flyway follow-up — auto-DDL won't create per-tenant schemas).
database.type: jpa

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration
  datasource:
    jdbcUrl: ${WKS_DB_URL:jdbc:postgresql://localhost:5432/wks}
    driver-class-name: org.postgresql.Driver
    username: ${WKS_DB_USER:wks}
    # No committed default: the Postgres password must be supplied via WKS_DB_PASSWORD.
    password: ${WKS_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${WKS_DDL_AUTO:update}
