# Concern fragment — Datastore: embedded H2 via the JPA path (no MongoDB container).
# Sets only the legacy canonical key (database.type, not the wks.datastore.type alias,
# since the alias post-processor is env/sysprop-only and unreliable for in-profile yml).
database.type: jpa

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration
  datasource:
    jdbcUrl: jdbc:h2:mem:wks;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  # Schema generated by Hibernate from the JPA entities (EngineDatabaseTenantConfig).
  jpa:
    hibernate:
      ddl-auto: ${WKS_DDL_AUTO:create}
