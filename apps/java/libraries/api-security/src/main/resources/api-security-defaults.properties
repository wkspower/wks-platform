# api-security library defaults.
#
# Single home for the defaults of the cross-cutting security properties this
# library binds via @Value, so the values are NOT hardcoded in the Java sources
# and every consumer (case-engine-rest-api, storage-api, c7-external-tasks, ...)
# resolves them without re-declaring them.
#
# Loaded via @PropertySource (ApiSecurityDefaultsConfig) at the LOWEST config
# precedence: any application.yml, profile fragment or environment variable in a
# consuming service overrides these. Each value is itself env-overridable.
#
# NOTE: the dead SelectorAliasEnvironmentPostProcessor is NOT a viable home for
# these (it doesn't run at boot under Spring Boot 4 — see issue #480); @PropertySource
# does run, hence this file.

# JWKS issuer URL for the default Keycloak auth mode (resource-server validation).
# Sourced from the legacy KEYCLOAK_URL env var for backward-compatible compose/.env.
wks.auth.issuer-uri=${KEYCLOAK_URL:http://localhost:8082}

# JWKS issuer URL for dev-token mode — the in-process /dev-auth endpoint that minted
# the token. Validation fetches its JWKS over the network (the issuer is NOT taken
# from the token's iss), so in a multi-container deployment every service must reach
# the issuing service: set WKS_DEVTOKEN_ISSUER_URL to the engine's address. The
# docker-compose default is the engine's service name; localhost suits a single-process
# (mvn) run. Independent of KEYCLOAK_URL so the two modes never clash.
wks.auth.devtoken.issuer-uri=${WKS_DEVTOKEN_ISSUER_URL:http://localhost:8081/dev-auth}

# Open Policy Agent decision endpoint (default, fail-secure authorization mode).
opa.url=${OPA_URL:http://localhost:8181/v1/data/wks/authz/allow}

# JWT claim carrying the tenant id (read by BearerTokenHandlerInputResolver and
# the OPA enforcer). Single key for the whole platform.
wks.tenancy.claim-name=${WKS_TENANCY_CLAIM_NAME:org}

# Dev-token issuer defaults (only consumed when wks.auth.mode=dev-token).
wks.auth.devtoken.roles=${WKS_DEVTOKEN_ROLES:mgmt_case_def,mgmt_record_type,mgmt_form,client_case,client_task,client_record}
wks.auth.devtoken.allowed-origins=${WKS_DEVTOKEN_ALLOWED_ORIGINS:http://localhost:3001}
