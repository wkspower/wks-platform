name: Build Artifacts

on:
  push:
    branches:
      - "**"
  # Gate every PR on the build + tests. Without this trigger the checks run only
  # on branch push and aren't associated with the PR, so branch protection can't
  # require them. This is what turns the test suite into a real merge gate.
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPOSITORY_OWNER: wkspower
  KEYCLOAK_URL: http://localhost:8082
  WKS_API_URL: http://localhost:8081
  WKS_STORAGE_API_URL: http://localhost:8085
  WEBSOCKET_ENABLED: false
  WEBSOCKET_URL: ws://localhost:8484
  TOPIC_CASE_CREATE: case-create
  TOPIC_CREATE_HUMAN_TASK: human-task-create
  NOVU_ENABLED: false
  NOVU_PUBLISHER_API_URL: http://localhost:3002

jobs:
  build-java:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4    
      - name: Set up jdk 18
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up maven
        uses: stCarolas/setup-maven@v4.5
        with:
          maven-version: 3.8.2

      # `verify` (not `package`) so maven-failsafe-plugin runs the *IT integration
      # tests and JaCoCo writes coverage reports. The config anti-drift gate
      # (ConfigSchemaValidationTest) also runs as part of the reactor.
      - name: Build and test backend api
        run: mvn -B verify --file apps/java/pom.xml

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: "apps/java/**/target/site/jacoco/**"
          if-no-files-found: warn

  # The config Standard's JS validator is the same source of truth the backend
  # anti-drift test loads. Running its node:test suite in CI keeps the published
  # @wkspower/case-config-schema package honest.
  test-config-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and test case-config-schema
        run: |
          npm ci
          npm test
        working-directory: packages/case-config-schema

  build-react:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4    

      - name: Install dependencies for case-portal
        run: yarn --cwd apps/react/case-portal install

      - name: Build for case-portal
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: |
          export REACT_APP_AUTH_ISSUER_URL="${{ env.KEYCLOAK_URL }}"
          export REACT_APP_API_URL="${{ env.WKS_API_URL }}"
          export REACT_APP_STORAGE_URL="${{ env.WKS_STORAGE_API_URL }}"
          export REACT_APP_WEBSOCKETS_ENABLED="${{ env.WEBSOCKET_ENABLED }}"
          export REACT_APP_WEBSOCKETS_URL="${{ env.WEBSOCKET_URL }}"
          export REACT_APP_WEBSOCKETS_CASE_CREATED="${{ env.TOPIC_CASE_CREATE }}"
          export REACT_APP_WEBSOCKETS_HUMAN_TASK_CREATED="${{ env.TOPIC_CREATE_HUMAN_TASK }}"
          export REACT_APP_NOVU_ENABLED="${{ env.NOVU_ENABLED }}"
          export REACT_APP_NOVU_PUBLISHER_API_URL="${{ env.NOVU_PUBLISHER_API_URL }}"
          yarn --cwd apps/react/case-portal build

  # On develop only: republish the floating :develop image set so `docker compose up`
  # (default WKS_VERSION=develop) pulls a build that matches develop source. Releases
  # are pinned via tags (release.yml). maven_revision empty -> jars keep the SNAPSHOT.
  publish-develop:
    if: github.ref == 'refs/heads/develop'
    needs: [build-java, build-react, test-config-schema]
    uses: ./.github/workflows/publish-images.yml
    permissions:
      contents: read
      packages: write
    with:
      maven_revision: ""
    secrets: inherit
