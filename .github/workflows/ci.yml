name: CI

on:
  pull_request:
  push:
    # v2-develop is the active trunk for v2 work; develop stays frozen
    # at v1-final until v2 is merged in.
    branches: [v2-develop, develop]

jobs:
  backend:
    name: Backend (Temurin 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build + verify (unit + ArchUnit)
        run: ./mvnw -B -ntp verify

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Story 1.3 AC #13: at least 4 woff2 font files (Poppins SemiBold/Bold,
      # Rubik Regular/Medium) must land in the production bundle. Story 6.1
      # raises this to >= 6 when JetBrains Mono ships with the Developer
      # Console. Failing this assertion fails the build.
      - name: Font count assertion
        run: |
          count=$(find dist/assets -name '*.woff2' | wc -l)
          echo "Found $count woff2 files in dist/assets"
          if [ "$count" -lt 4 ]; then
            echo "Expected >= 4 woff2 files, found $count" >&2
            exit 1
          fi

  tenant-invariant:
    name: Tenant invariant (D25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan protected packages
        run: ./backend/.ci/check-tenant-invariant.sh

  deploy-runbook:
    name: Deploy runbook (Story 14.7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck + envsubst
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck gettext-base

      - name: Shellcheck deploy scripts
        run: shellcheck deploy/wks-deploy.sh deploy/probes/check-runtime-no-tenant-id.sh

      - name: Render compose template against fixture
        env:
          WKS_CLIENT_LICENSE_HOST_PATH: /tmp/license.jwt
          WKS_HOST_PORT: "18080"
        run: |
          set -a
          # shellcheck disable=SC1091
          . deploy/clients/_fixture/client.env
          set +a
          mkdir -p /tmp/wks-fixture
          envsubst '${WKS_CLIENT_SLUG} ${WKS_PUBLIC_URL} ${WKS_DB_PASSWORD} ${WKS_MINIO_ROOT_PASSWORD} ${WKS_ADMIN_EMAIL} ${WKS_ADMIN_PASSWORD} ${WKS_LICENSE_PATH} ${WKS_IMAGE_TAG} ${WKS_JWT_SECRET} ${WKS_CLIENT_LICENSE_HOST_PATH} ${WKS_HOST_PORT}' \
            < deploy/templates/docker-compose.client.yml.template \
            > /tmp/wks-fixture/docker-compose.yml
          docker compose -f /tmp/wks-fixture/docker-compose.yml config -q

      - name: Tenant invariant scan — operator surfaces (deploy/clients/, docker/.env*, application-production.yml)
        # Story 14.7 AC9.3 (extended by Story 14.1 AC8): dedicated scan of
        # operator-supplied env files + the production-profile YAML where
        # tenant_id leakage would be a real bug. Story 3.0's narrow Java/SQL
        # lint is intentionally left untouched — see docs/ops/per-client-deploy-runbook.md
        # and the Dev Notes block of 14-7-per-client-deploy-runbook.md for the
        # rationale (deploy scripts + templates + runbook intentionally
        # reference the forbidden tokens to ENFORCE the invariant).
        #
        # Story 14.1 extends the scan paths to cover the new single-tenant
        # production surface: docker/.env.production.example,
        # docker/docker-compose.yml, docker/README.md, and
        # backend/src/main/resources/application-production.yml.
        run: |
          if grep -RIE '(tenant_id|tenantId|@TenantId)' \
               --exclude-dir=_fixture \
               deploy/clients 2>/dev/null; then
            echo "Tenant invariant (D25) FAILED in deploy/clients/. See docs/zero-tenant-id.md." >&2
            exit 1
          fi
          # Strip comment lines (env / YAML use `#`) — the AC4/AC8 mandatory
          # header sentence intentionally references the forbidden tokens to
          # ENFORCE the invariant; we scan VALUE-bearing lines only.
          for f in docker/.env.production.example \
                   docker/docker-compose.yml \
                   backend/src/main/resources/application-production.yml; do
            if grep -nE '^[[:space:]]*[^#[:space:]].*(tenant_id|tenantId|@TenantId)' "$f" 2>/dev/null; then
              echo "Tenant invariant (D25) FAILED in $f (non-comment line). See docs/zero-tenant-id.md." >&2
              exit 1
            fi
          done
          echo "Operator-surface tenant invariant (D25) OK"

      - name: Re-run Story 3.0 static lint
        run: ./backend/.ci/check-tenant-invariant.sh

  docker-build:
    name: Docker image (build only, no push)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: false
          tags: wkspower/wks-platform:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  production-profile-smoke:
    # Story 14.1 AC6 — boot the production profile against real Postgres + MinIO
    # via `docker compose --profile production up`, poll /api/health, and assert
    # ZERO H2-driver loading in the container logs (the regression guard for
    # Story 14.7 §8 / WKS-API-053). Re-uses Story 14.7's runtime tenant-id probe.
    # Local replication required per "Match CI Locally" memory before PR.
    name: Production profile smoke (Story 14.1)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build production image (load into local daemon)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: wkspower/wks-platform:2.0.0-prod
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write fixture .env (synthetic secrets — CI only)
        # JWT secret is a CI-only deterministic Base64 string (≥32 bytes after
        # decoding) that satisfies JwtTokenProvider's WKS-API-053 production
        # validation without exposing a real key. Operators MUST generate their
        # own with `openssl rand -base64 48`.
        run: |
          JWT_FIXTURE=$(printf 'wks-ci-fixture-jwt-secret-bytes-padding-padding-padding' | base64)
          cat > docker/.env <<EOF
          WKS_DB_URL=jdbc:postgresql://postgres:5432/wks
          WKS_DB_USER=wks
          WKS_DB_PASSWORD=ci-fixture-db-password
          WKS_STORAGE_ENDPOINT=http://minio:9000
          WKS_STORAGE_KEY=minioadmin
          WKS_ADMIN_EMAIL=admin@ci.invalid
          WKS_ADMIN_PASSWORD=ci-fixture-admin-password
          WKS_LOCALE=en-IN
          WKS_CORS_ORIGINS=http://localhost:8080
          WKS_JWT_SECRET=${JWT_FIXTURE}
          WKS_OPENAPI_ENABLED=false
          WKS_KEYCLOAK_ENABLED=false
          WKS_MINIO_ROOT_USER=minioadmin
          WKS_MINIO_ROOT_PASSWORD=ci-fixture-minio-password
          WKS_HOST_PORT=8080
          EOF

      - name: Bring up production profile stack
        working-directory: docker
        run: docker compose --profile production up -d

      - name: Poll /api/health (90s deadline)
        run: |
          deadline=$((SECONDS + 90))
          healthy=0
          while [[ $SECONDS -lt $deadline ]]; do
            if curl -fsS http://localhost:8080/api/health >/dev/null 2>&1; then
              healthy=1
              break
            fi
            sleep 3
          done
          if [[ $healthy -ne 1 ]]; then
            echo "::error::/api/health did not become healthy within 90s"
            docker compose -f docker/docker-compose.yml --profile production logs
            exit 1
          fi
          echo "Health OK"

      - name: Assert ZERO H2 driver in container logs (regression guard)
        # Story 14.7 §8 / WKS-API-053 — `Driver org.h2.Driver claims to not accept
        # jdbcUrl, jdbc:postgresql://...`. THIS is the assertion that catches it.
        run: |
          logs=$(docker logs wks-platform-prod 2>&1)
          if printf '%s' "$logs" | grep -E 'org\.h2\.Driver|jdbc:h2:'; then
            echo "::error::H2 driver loaded under production profile (regression — Story 14.7 §8)"
            exit 1
          fi
          echo "H2-driver invariant OK: no org.h2.Driver / jdbc:h2: references in production logs"

      - name: Run runtime ZERO-tenant_id invariant probe
        # Re-uses Story 14.7's already-shipped probe. AC6.6 + AC8 — extends the
        # runtime check to the production-profile container without re-implementation.
        run: ./deploy/probes/check-runtime-no-tenant-id.sh http://localhost:8080

      - name: Tear down (purge volumes)
        if: always()
        working-directory: docker
        run: docker compose --profile production down -v
