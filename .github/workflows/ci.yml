name: CI

on:
  pull_request:
  push:
    # v2-develop is the active trunk for v2 work; develop stays frozen
    # at v1-final until v2 is merged in.
    branches: [v2-develop, develop]

jobs:
  backend:
    name: Backend (Temurin 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build + verify (unit + ArchUnit)
        run: ./mvnw -B -ntp verify

  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Story 1.3 AC #13: at least 4 woff2 font files (Poppins SemiBold/Bold,
      # Rubik Regular/Medium) must land in the production bundle. Story 6.1
      # raises this to >= 6 when JetBrains Mono ships with the Developer
      # Console. Failing this assertion fails the build.
      - name: Font count assertion
        run: |
          count=$(find dist/assets -name '*.woff2' | wc -l)
          echo "Found $count woff2 files in dist/assets"
          if [ "$count" -lt 4 ]; then
            echo "Expected >= 4 woff2 files, found $count" >&2
            exit 1
          fi

  tenant-invariant:
    name: Tenant invariant (D25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan protected packages
        run: ./backend/.ci/check-tenant-invariant.sh

  docker-build:
    name: Docker image (build only, no push)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: false
          tags: wkspower/wks-platform:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
