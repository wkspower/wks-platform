# WKS Platform — default (dev) profile
#
# Zero env vars required for dev: H2 file-mode datasource, local storage,
# console logging. Production overrides live in application-production.yml.

server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: wks-platform

  # H2 FILE mode (never in-memory — data must survive restart).
  # See ./data/ volume declaration in docker-compose.yml.
  datasource:
    url: jdbc:h2:file:./data/wksplatform;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema — never 'update' or 'create'.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    # Dialect-specific layout (Story 1.4): `common/` always runs; `h2/` is dev-only. Postgres
    # scripts live in `postgresql/` and are activated by application-production.yml, never here.
    locations: classpath:db/migration/common,classpath:db/migration/h2

# Belt-and-suspenders: @SpringBootApplication(exclude = CamundaBpmAutoConfiguration.class)
# already disables the engine; this prevents any accidental re-enablement via property scan.
camunda:
  bpm:
    enabled: false

wks:
  locale: en-IN
  admin:
    email: ${WKS_ADMIN_EMAIL:}
    password: ${WKS_ADMIN_PASSWORD:}
  jwt:
    secret: ${WKS_JWT_SECRET:}
    ttl-hours: ${WKS_JWT_TTL_HOURS:8}
  cors:
    origins: ${WKS_CORS_ORIGINS:http://localhost:5173}
  case-types:
    # Directory scanned on startup (Story 2.1). Valid YAMLs register; invalid ones log a WARN
    # and are skipped. In container the default resolves to /app/case-types/.
    dir: ${WKS_CASE_TYPES_DIR:./case-types/}
    # Default: boot with the registered subset. Set to true for fail-fast in CI or strict
    # production rollouts.
    fail-on-invalid: ${WKS_CASE_TYPES_FAIL_ON_INVALID:false}

logging:
  level:
    root: INFO
    com.wkspower: DEBUG
