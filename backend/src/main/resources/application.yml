# WKS Platform — default (dev) profile
#
# Zero env vars required for dev: H2 file-mode datasource, local storage,
# console logging. Production overrides live in application-production.yml.

server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: wks-platform

  servlet:
    multipart:
      # Story 2.2 admin /api/admin/deploy: 1 MB per part, 2 MB per request (caseType + bpmn).
      # Spring throws MaxUploadSizeExceededException → mapped to WKS-API-413 by the handler.
      max-file-size: 1MB
      max-request-size: 2MB

  # H2 FILE mode (never in-memory — data must survive restart).
  # See ./data/ volume declaration in docker-compose.yml.
  datasource:
    url: jdbc:h2:file:./data/wksplatform;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema — never 'update' or 'create'.
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    # Dialect-specific layout (Story 1.4): `common/` always runs; `h2/` is dev-only. Postgres
    # scripts live in `postgresql/` and are activated by application-production.yml, never here.
    locations: classpath:db/migration/common,classpath:db/migration/h2

# ENGINE NOW ON — see Story 2.2. The bootstrap drops its excludeName and the embedded BPMN engine
# activates via the property below. WKS owns deployment through the WorkflowEngine port
# (auto-deployment-enabled false); the engine owns its own DDL on the SAME primary DataSource
# (database.schema-update true, Flyway never touches ACT_*). history-level pinned to 'full' —
# never AUTO; see project-context.md for rationale.
#
# Property keys are the upstream Camunda namespace, retained by the current engine distribution
# for backwards compatibility — they are config-system identifiers, not a product reference.
camunda:
  bpm:
    enabled: true
    history-level: full
    job-execution:
      enabled: true                        # async-after / async-before continuations need this
    auto-deployment-enabled: false         # WKS deploys via WorkflowEngine, not classpath scan
    generic-properties:
      properties:
        jdbc-batch-processing: true
    metrics:
      enabled: false                       # noisy in dev; production overrides flip this on
    database:
      schema-update: true                  # engine owns its own ACT_* DDL — Flyway is hands-off

wks:
  locale: en-IN
  admin:
    email: ${WKS_ADMIN_EMAIL:}
    password: ${WKS_ADMIN_PASSWORD:}
  jwt:
    secret: ${WKS_JWT_SECRET:}
    ttl-hours: ${WKS_JWT_TTL_HOURS:8}
  cors:
    origins: ${WKS_CORS_ORIGINS:http://localhost:5173}
  case-types:
    # Directory scanned on startup (Story 2.1). Valid YAMLs register; invalid ones log a WARN
    # and are skipped. In container the default resolves to /app/case-types/.
    dir: ${WKS_CASE_TYPES_DIR:./case-types/}
    # Default: boot with the registered subset. Set to true for fail-fast in CI or strict
    # production rollouts.
    fail-on-invalid: ${WKS_CASE_TYPES_FAIL_ON_INVALID:false}

logging:
  level:
    root: INFO
    com.wkspower: DEBUG
