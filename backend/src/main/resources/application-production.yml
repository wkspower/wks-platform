# WKS Platform — production profile overrides
#
# Activate with SPRING_PROFILES_ACTIVE=production. All secrets/config come
# from env vars; the image itself has no production defaults baked in.

spring:
  datasource:
    url: ${WKS_DB_URL}
    username: ${WKS_DB_USER}
    password: ${WKS_DB_PASSWORD}
    # Driver inferred from URL (postgresql://). Override only if needed.

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    # Dialect-specific layout (Story 1.4): `common/` runs on every profile; `postgresql/` is the
    # Postgres-specific slot. Keeps H2-only scripts out of the production container entirely.
    locations: classpath:db/migration/common,classpath:db/migration/postgresql

# Engine activation mirrors application.yml; production flips metrics on.
camunda:
  bpm:
    enabled: true
    history-level: full
    job-execution:
      enabled: true
    auto-deployment-enabled: false
    generic-properties:
      properties:
        jdbc-batch-processing: true
    metrics:
      enabled: true
    database:
      schema-update: true

wks:
  locale: ${WKS_LOCALE:en-IN}
  cors:
    origins: ${WKS_CORS_ORIGINS:}
  storage:
    endpoint: ${WKS_STORAGE_ENDPOINT:}
    key: ${WKS_STORAGE_KEY:}
  case-types:
    # Operators typically set WKS_CASE_TYPES_DIR to a mounted path in container.
    dir: ${WKS_CASE_TYPES_DIR:./case-types/}
    fail-on-invalid: ${WKS_CASE_TYPES_FAIL_ON_INVALID:false}

# OpenAPI / Swagger UI — disabled in production by default. Set WKS_OPENAPI_ENABLED=true to opt
# in (SecurityConfig reads the same env var to permit the paths). Unauthenticated
# `/v3/api-docs` in production is a recurring CVE vector.
springdoc:
  api-docs:
    enabled: ${WKS_OPENAPI_ENABLED:false}
  swagger-ui:
    enabled: ${WKS_OPENAPI_ENABLED:false}

logging:
  level:
    root: INFO
    com.wkspower: INFO
