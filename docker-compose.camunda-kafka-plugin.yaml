# =============================================================================
#  ADVANCED OVERLAY — engine-side Kafka event publishing (Camunda 7 plugin).
#
#  The base `notifications` profile already publishes case-created and
#  email-outbound events from c7-external-tasks (no build needed). This overlay
#  adds the in-engine plugin that ALSO emits human-task-created events directly
#  from Camunda. It mounts a plugin jar that you must build first:
#
#    cd apps/java && mvn -B -pl libraries/c7-plugins -am package
#
#  Then bring the stack up WITH this file and the notifications profile:
#
#    COMPOSE_PROFILES=portal,notifications KAFKA_ENABLED=true \
#      docker compose -f docker-compose.yml -f docker-compose.camunda-kafka-plugin.yaml up -d
#
#  (kafka-clients-3.4.1.jar and default.yml are committed under configs/camunda/.)
# =============================================================================

name: wks-platform

services:
    camunda:
        volumes:
            - ./apps/java/libraries/c7-plugins/target/c7-plugins-1.0-SNAPSHOT.jar:/camunda/configuration/userlib/c7-plugins-1.0-SNAPSHOT.jar
            - ./configs/camunda/kafka-clients-3.4.1.jar:/camunda/configuration/userlib/kafka-clients-3.4.1.jar
            - ./configs/camunda/default.yml:/camunda/configuration/default.yml
        environment:
            - KAFKA_URL=${KAFKA_URL}
            - KAFKA_TOPIC_CREATE_HUMAN_TASK=${KAFKA_TOPIC_CREATE_HUMAN_TASK}
